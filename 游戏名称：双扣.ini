游戏名称：双扣
所需卡牌：两幅完整的扑克牌（含大小王，共13*4*2+2*2=108张牌）
游戏规则：一共四个人，两两分组。设两个组的人分别为AC和BD，则坐次按顺时针为ABCD。任意操作（发牌/打牌）都满足这个顺序。
       发牌阶段：把108张牌轮流随机分配给4个人，分配过程中，如果有任意一人有两张同花色同点数的牌，则可以进行“叫主”，即打出这对牌（不露出点数，但是需要告知所有人这两张牌的花色），则此时称这个花色为“主色”，称主花色的牌为“主牌”。除了主色的牌以外，任意花色的5，3，2和大小王也是主牌，主牌内的大小顺序满足：主花色5>大王>小王>其他花色5>主花色3>其他花色3>主花色2>其他花色2>主花色A>主花色K>主花色Q……>主花色6>主花色4。在发牌阶段结束后，可以进行“顶主对”，即不在叫主的人的队伍中的人若认为自己有和主色相同，且点数（此时只关注牌上点数大小，即K>Q>……>2>A）更大的对，则可打出。此时公开比较之前打出的对和新打出的对（四个人都能看到），点数更大的那对胜利，打出点数更大的人得到打出的四张牌，并给打出点数更小的人两张副牌（除了主牌都是副牌）。副牌大小关系满足A>K>Q>J>……>6>4。称打出点数更大的那个人所在的组为“得分组”，称打出点数更小的那个人所在的组为“跑分组”。此时发牌阶段完成。
      打牌阶段：由跑分组之间选出一个人第一个出牌（两个根据自己的手牌各给出一个当第一的意愿a，a在0到1之间。比较两者的a，a更大的人当第一个出牌的）。每轮出牌四个人按顺时针出牌，且出牌的牌数是一样的，保证最后一轮结束后每个人的手牌均为0。每一轮第一个人可以任意出牌。出牌规则：每轮的牌类由第一个出牌的人决定，他可出一张或一对主牌或副牌，一对指同花色同点数的两张牌。若第一个人出一张副牌，则后面的人都需要出同花色的副牌；若后面的人没有同花色的牌，则可出任意花色的牌。若第一个人出一对副牌，则后面的人都需要出同花色的一对副牌；若后面的人没有同花色的一对副牌且有大于等于两张副牌，则需要打出两张最大的牌；若后面的人没有同花色的一对副牌且只有一张副牌，则除了打出这张副牌以外，另一张牌可以是。

